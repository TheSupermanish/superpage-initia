server {
    listen 80;
    server_name init.superpa.ge www.init.superpa.ge _;

    # Backend API
    location /api/ {
        proxy_pass http://initpage-app:1337;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # x402 gateway
    location /x402/ {
        proxy_pass http://initpage-app:1337;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP endpoints
    location /mcp {
        proxy_pass http://initpage-app:1337;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # A2A protocol
    location /a2a {
        proxy_pass http://initpage-app:1337;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Agent discovery
    location /.well-known/ {
        proxy_pass http://initpage-app:1337;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://initpage-app:1337;
    }

    # Frontend (everything else)
    location / {
        proxy_pass http://initpage-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
